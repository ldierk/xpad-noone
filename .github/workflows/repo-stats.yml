name: github-repo-stats

on:
  schedule:
    # Run daily at 23:00 UTC. GitHub only keeps 14 days of traffic data,
    # so this accumulates clone/view history over time in a data branch.
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  repo-stats:
    runs-on: ubuntu-latest
    steps:
      - name: run-ghrs
        uses: jgehrcke/github-repo-stats@v1.4.2
        with:
          repository: forkymcforkface/xpad-noone
          ghtoken: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
          # Data branch is exposed via GitHub Pages so report links resolve.
          ghpagesprefix: https://forkymcforkface.github.io/xpad-noone
